limit_req_zone $binary_remote_addr zone=thread_limit:10m rate=90r/m;

server {
    listen 80;
    listen [::]:80;

    server_name api.dianerdiana.com;

    # Log
    access_log /var/log/nginx/api-dianerdiana-com.access.log;
    error_log /var/log/nginx/api-dianerdiana-com.error.log;

    location / {
      proxy_pass http://127.0.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

    }

    location /threads {
      limit_req zone=thread_limit burst=10 nodelay;
      limit_req_status 429;

      proxy_pass http://127.0.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
}